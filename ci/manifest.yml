projects:
  - libvirt-rust
  - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

gitlab:
  namespace: libvirt
  project: libvirt-rust
  jobs:
    cargo-fmt: true

targets:

  alpine-323: x86_64

  alpine-edge: x86_64

  almalinux-9: x86_64

  almalinux-10:
    projects:
      - libvirt-rust
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+minimal.yml
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

    jobs:
      - arch: x86_64
      - arch: x86_64
        template: .native_git_build_job
        suffix: -git

  centos-stream-9: x86_64

  centos-stream-10: x86_64

  debian-13:
    jobs:
      - arch: x86_64
      - arch: aarch64
      - arch: armv6l
      - arch: armv7l
      - arch: i686
      - arch: ppc64le
      - arch: s390x

  debian-sid: x86_64

  fedora-43: x86_64

  fedora-44:
    jobs:
      - arch: x86_64
        variables:
          CLIPPY: enable
          DOC: enable

  fedora-rawhide: x86_64

  opensuse-leap-15: x86_64

  opensuse-leap-16: x86_64

  opensuse-tumbleweed: x86_64

  ubuntu-2404: x86_64

  ubuntu-2604: x86_64
